<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZerOAuth</title>

  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --text: #c9d1d9;
      --muted: #8b949e;
      --match: #238636;
    }
	
	.logo {
	  font-size: clamp(1.4rem, 4vw, 2rem);
	  font-weight: 600;
	  margin-bottom: 0.6em;
	  color: #c9d1d9;
	  letter-spacing: 0.5px;
	}
	
	.logo span {
	  color: #58a6ff;
	}
	
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Fira Code", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px;
      box-sizing: border-box;
    }

    h1 {
      color: var(--accent);
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 0.2em;
      text-align: center;
    }

    #status {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5em;
      text-align: center;
    }

    #moves {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1em;
    }

    .game-wrapper {
      position: relative;
      width: min(92vw, 420px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.4rem, 5vw, 2rem);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card.flipped {
      background: #21262d;
    }

    .card.matched {
      background: var(--match);
      border-color: #2ea043;
      color: #fff;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,0.75);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      text-align: center;
      padding: 20px;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .overlay h2 {
      color: var(--accent);
      margin-bottom: 0.5em;
    }

    .overlay p {
      color: var(--muted);
      margin-bottom: 1em;
    }

    button {
      padding: 10px 16px;
      font-size: 0.9rem;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      width: 180px;
    }

    .footer {
      margin-top: 1.2em;
      font-size: 0.75rem;
      color: #6e7681;
      text-align: center;
    }
	
	.version {
	  position: fixed;
	  bottom: 6px;
	  right: 10px;
	  font-size: 0.7rem;
	  color: #6e7681;
	  opacity: 0.5;
	  user-select: none;
	  pointer-events: none;
	}
  </style>
</head>
<body>
  <div class="logo">
    <span>&lt;</span>ZerOAuth<span>/&gt;</span>
  </div>
  
  <h1>Please prove that you are a human...</h1>
  <div id="status">Match the pairs to unlock the site 👨‍💻</div>
  <div id="moves">Moves: 0</div>

  <div class="game-wrapper">
    <div class="grid" id="game"></div>

    <!-- Overlay -->
    <div class="overlay" id="overlay">
      <h2>Access Granted ✅</h2>
      <p id="finalText"></p>
      <button onclick="initGame()">Restart</button>
    </div>
  </div>

  <div class="footer">Human-friendly®️ procrastination tool.</div>
  <div class="version">v0.0.2</div>
  
  <script>
    const symbols = ["💻","🖥️","⌨️","🧠","🐛","⚡","📦","🔒"];
    let cards = [];
    let flipped = [];
    let matchedCount = 0;
    let moves = 0;

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      const game = document.getElementById("game");
      const overlay = document.getElementById("overlay");

      game.innerHTML = "";
      overlay.classList.remove("active");

      flipped = [];
      matchedCount = 0;
      moves = 0;
      updateMoves();

      cards = shuffle([...symbols, ...symbols]);

      cards.forEach(symbol => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;

        card.addEventListener("click", () => flipCard(card));
        game.appendChild(card);
      });

      document.getElementById("status").textContent =
        "Match the pairs to unlock the site 👨‍💻";
    }

    function updateMoves() {
      document.getElementById("moves").textContent = "Moves: " + moves;
    }

    function flipCard(card) {
      if (
        flipped.length === 2 ||
        card.classList.contains("flipped") ||
        card.classList.contains("matched")
      ) return;

      vibrate(10);

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;
      flipped.push(card);

      if (flipped.length === 2) {
        moves++;
        updateMoves();
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;

      if (a.dataset.symbol === b.dataset.symbol) {
        a.classList.add("matched");
        b.classList.add("matched");
        matchedCount += 2;

        vibrate([40,20,40]);

        if (matchedCount === cards.length) {
          showOverlay();
          vibrate([100,30,100]);
        }

        flipped = [];
      } else {
        setTimeout(() => {
          a.classList.remove("flipped");
          b.classList.remove("flipped");
          a.textContent = "";
          b.textContent = "";
          flipped = [];
        }, 500);
      }
    }

function showOverlay() {
  const overlay = document.getElementById("overlay");
  const finalText = document.getElementById("finalText");

  const variations = [
    score => `You are ${score}% human`,
    score => `You are ${score}% human (probably)`,
    score => `You are ${score}% human • acceptable`,
    score => `You are ${score}% human (we're watching you)`,
    score => `You are ${score}% human • suspiciously efficient`,
    score => `You are ${score}% human • 1% JavaScript`,
    score => `You are ${score}% human • CAPTCHA passed`,
    score => `You are ${score}% human • close enough`,
    score => `You are ${score}% human • margin of error ±42%`,
    score => `You are ${score}% human • please don't automate this`
  ];

  // Mostly believable, occasionally cursed
  const score = Math.random() < 0.85
    ? Math.floor(Math.random() * 21) + 80   // 80–100%
    : Math.floor(Math.random() * 31) + 50;  // 50–80% (rare suspicious result)

  const message = variations[Math.floor(Math.random() * variations.length)](score);

  finalText.innerHTML = `
    Completed in ${moves} moves.<br>
    ${message}<br>
  `;

  overlay.classList.add("active");
}

    initGame();
  </script>

</body>
</html>
