<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zer oAuth</title>

  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --text: #c9d1d9;
      --muted: #8b949e;
      --match: #238636;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Fira Code", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }

    h1 {
      color: var(--accent);
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-align: center;
      margin-bottom: 0.3em;
    }

    #status {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--muted);
      text-align: center;
      margin-bottom: 1.2em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: min(92vw, 420px);
    }

    .card {
      aspect-ratio: 1 / 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.4rem, 5vw, 2rem);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card.flipped {
      background: #21262d;
    }

    .card.matched {
      background: var(--match);
      border-color: #2ea043;
      color: #fff;
    }

    button {
      margin-top: 16px;
      padding: 10px 16px;
      font-size: 0.9rem;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      width: min(200px, 80%);
    }

    button:active {
      transform: scale(0.97);
    }

    .footer {
      margin-top: 1.2em;
      font-size: 0.75rem;
      color: #6e7681;
      text-align: center;
    }

    /* Small screens tweak */
    @media (max-width: 400px) {
      .grid {
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <h1>Please prove that you are a human...</h1>
  <div id="status">Match the pairs to unlock the site 👨‍💻</div>

  <div class="grid" id="game"></div>

  <button onclick="initGame()">Restart</button>

  <div class="footer">Human-friendly procrastination tool</div>

  <script>
    const symbols = ["💻","🖥️","⌨️","🧠","🐛","⚡","📦","🔒"];
    let cards = [];
    let flipped = [];
    let matchedCount = 0;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      const game = document.getElementById("game");
      game.innerHTML = "";
      flipped = [];
      matchedCount = 0;

      cards = shuffle([...symbols, ...symbols]);

      cards.forEach((symbol) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;

        card.addEventListener("click", () => flipCard(card));
        game.appendChild(card);
      });

      document.getElementById("status").textContent =
        "Match the pairs to unlock the site 👨‍💻";
    }

    function flipCard(card) {
      if (
        flipped.length === 2 ||
        card.classList.contains("flipped") ||
        card.classList.contains("matched")
      ) return;

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;
      flipped.push(card);

      if (flipped.length === 2) {
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;

      if (a.dataset.symbol === b.dataset.symbol) {
        a.classList.add("matched");
        b.classList.add("matched");
        matchedCount += 2;

        if (matchedCount === cards.length) {
          document.getElementById("status").textContent =
            "Access Granted ✅ (You are at least 10% human!)";
        }

        flipped = [];
      } else {
        setTimeout(() => {
          a.classList.remove("flipped");
          b.classList.remove("flipped");
          a.textContent = "";
          b.textContent = "";
          flipped = [];
        }, 500);
      }
    }

    initGame();
  </script>

</body>
</html>
